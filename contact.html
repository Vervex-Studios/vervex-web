<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Vervex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f9f6f2;
      color: #1a1510;
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .page-card {
      max-width: 720px;
      width: 100%;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(15,15,15,0.08);
      padding: 3rem;
    }

    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      margin-bottom: 1rem;
    }

    p {
      color: #5b5650;
      line-height: 1.8;
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .contact-grid {
      display: grid;
      gap: 1rem;
      margin-bottom: 2rem;
      text-align: left;
    }

    .contact-item {
      background: #fbf8f4;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 16px;
      padding: 1rem 1.2rem;
    }

    .contact-item span {
      display: block;
      font-size: 0.85rem;
      color: #8b827c;
      margin-bottom: 0.3rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .contact-item a {
      color: #1a1510;
      text-decoration: none;
      font-weight: 600;
      word-break: break-all;
    }

    form {
      margin-bottom: 1.75rem;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #1a1510;
      font-size: 0.95rem;
    }

    input,
    textarea {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      font-size: 1rem;
      margin-bottom: 1.25rem;
      font-family: inherit;
      background: #ffffff;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #1a1510;
      box-shadow: 0 0 0 4px rgba(26,21,16,0.05);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }

    button[type="submit"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 2rem;
      background: #1a1510;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .secondary-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.6rem;
      min-width: 160px;
      border-radius: 999px;
      background: #f4f0ec;
      color: #1a1510;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .secondary-link:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    @media (min-width: 640px) {
      .contact-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="page-card">
    <h1>Contact Vervex</h1>
    <p>Have a question, feedback, or want to work together? Send a message and I’ll reply as soon as possible.</p>

    <div class="contact-grid">
      <div class="contact-item">
        <span>Email</span>
        <a href="mailto:pingvinvok@protonmail.com">pingvinvok@protonmail.com</a>
      </div>
      <div class="contact-item">
        <span>Ask anything</span>
        <a href="mailto:pingvinvok@protonmail.com?subject=Contact%20from%20Vervex%20website">Send a note</a>
      </div>
    </div>

    <form id="contact-form">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" placeholder="Your name" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Write your message here" required></textarea>

      <div class="button-row">
        <button type="submit">Send message</button>
        <a class="secondary-link" href="index.html">Back to home</a>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('contact-form').addEventListener('submit', function (event) {
      event.preventDefault();
      var name = document.getElementById('name').value.trim();
      var email = document.getElementById('email').value.trim();
      var message = document.getElementById('message').value.trim();
      if (!name || !email || !message) {
        return;
      }
      var subject = encodeURIComponent('Contact from Vervex website');
      var body = encodeURIComponent('Name: ' + name + '\nEmail: ' + email + '\n\n' + message);
      window.location.href = 'mailto:pingvinvok@protonmail.com?subject=' + subject + '&body=' + body;
    });
  </script>
</body>
</html>
