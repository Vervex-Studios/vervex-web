<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Vervex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f9f6f2;
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      color: #1a1510;
    }

    .page-card {
      max-width: 720px;
      width: 100%;
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(15,15,15,0.08);
      padding: 3rem;
    }

    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      margin-bottom: 1rem;
    }

    p {
      color: #5b5650;
      line-height: 1.8;
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    form {
      margin-bottom: 2rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #1a1510;
    }

    textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 1rem;
      resize: vertical;
      font-family: inherit;
    }

    button[type="submit"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 2rem;
      background: #1a1510;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.95rem 2rem;
      background: #1a1510;
      color: #fff;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    a:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="page-card">
    <h1>Join Vervex</h1>
    <p>Hello there we are currently recruting and we are excited to have you on board!</p>
    <form id="contact-form">
      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="4" placeholder="Enter your message" required></textarea>
      <button type="submit">Submit</button>
    </form>
    <a href="index.html">Go back home</a>
  </div>
  <script>
    document.getElementById('contact-form').addEventListener('submit', function (event) {
      event.preventDefault();
      var message = document.getElementById('message').value.trim();
      if (!message) {
        return;
      }
      var subject = encodeURIComponent('Message for Vervex');
      var body = encodeURIComponent(message);
      window.location.href = 'mailto:pingvinvok@protonmail.com?subject=' + subject + '&body=' + body;
    });
  </script>
</body>
</html>
