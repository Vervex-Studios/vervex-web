<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
    <title>vervatinus - weather</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#121212; color:#ffffff; font-family:sans-serif;">
    <div id="header-placeholder"></div>
    <div style="padding:15px; max-width:100%; box-sizing:border-box;">
        <h1 id="weather-title" style="font-size:20px; margin:10px 0;">local weather</h1>
        <p id="weather-desc" style="font-size:14px; margin:10px 0;">check out what the weather looks like outside right now.</p>
        <form method="GET" action="weather.html" style="margin-bottom:15px;">
            <input type="text" name="location" placeholder="enter city" style="background-color:#222; color:#fff; border:1px solid #444; padding:6px; font-size:13px; width:140px;" />
            <input type="submit" value="update" style="background-color:#38bdf8; color:#111; border:none; padding:6px 12px; font-size:13px; font-weight:bold;" />
        </form>
        <div style="background-color:#0f172a; border:1px solid #1e293b; overflow:auto; max-width:100%;">
            <iframe id="weather-frame" src="http://wttr.in/" width="100%" height="420" frameborder="0" style="background-color:#0f172a; border:none;"></iframe>
        </div>
    </div>
    <div id="footer-placeholder"></div>
    <script type="text/javascript" src="webworkaround.js"></script>
    <script type="text/javascript">
        applyUserPreferences();
        var urlParams = new URLSearchParams(window.location.search);
        var targetLoc = urlParams.get('location');
        if(targetLoc) {
            document.getElementById('weather-frame').src = "http://wttr.in/" + encodeURIComponent(targetLoc) + "?T";
        }
    </script>
</body>
</html>
