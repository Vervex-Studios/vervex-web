<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
    <title>vervatinus - settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#121212; color:#ffffff; font-family:sans-serif;">
    <div id="header-placeholder"></div>
    <div style="padding:15px; max-width:100%; box-sizing:border-box;">
        <h1 id="settings-title" style="font-size:20px; margin:10px 0;">settings</h1>
        <p id="settings-desc" style="font-size:13px; color:#aaaaaa;">adjust choices below. values will save to cookies.</p>
        <div style="background-color:#1a1a1a; padding:15px; border:1px solid #2d2d2d; max-width:100%; box-sizing:border-box;">
            <label id="lbl-lang" style="display:block; font-weight:bold; margin-bottom:5px; font-size:13px;">language:</label>
            <select id="opt-lang" style="width:100%; background-color:#222; color:#fff; border:1px solid #444; padding:6px; font-size:13px; margin-bottom:15px;">
                <option value="UK">british english</option>
                <option value="US">us english</option>
                <option value="HU">hungarian (magyar)</option>
                <option value="UD">upside down</option>
                <option value="LC">lolcat</option>
            </select>
            <label id="lbl-bg" style="display:block; font-weight:bold; margin-bottom:5px; font-size:13px;">background theme:</label>
            <select id="opt-bg" style="width:100%; background-color:#222; color:#fff; border:1px solid #444; padding:6px; font-size:13px; margin-bottom:15px;">
                <option value="dark">dark grey profile</option>
                <option value="black">deep pitch black</option>
                <option value="white">standard contrast white</option>
            </select>
            <button onclick="saveEnvironmentSettings()" style="background-color:#38bdf8; color:#111; border:none; padding:8px 15px; font-size:13px; font-weight:bold; width:100%; text-align:center;" id="btn-save">save settings</button>
        </div>
    </div>
    <div id="footer-placeholder"></div>
    <script type="text/javascript" src="webworkaround.js"></script>
    <script type="text/javascript">
        applyUserPreferences();
        document.getElementById('opt-lang').value = getVervatinusCookie('v_lang') || 'UK';
        document.getElementById('opt-bg').value = getVervatinusCookie('v_bg') || 'dark';
        function saveEnvironmentSettings() {
            var selectedLang = document.getElementById('opt-lang').value;
            var selectedBg = document.getElementById('opt-bg').value;
            setVervatinusCookie('v_lang', selectedLang, 365);
            setVervatinusCookie('v_bg', selectedBg, 365);
            alert(selectedLang === 'HU' ? 'beallitasok sikeresen mentve!' : 'settings updated successfully!');
            window.location.reload();
        }
    </script>
</body>
</html>
