<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - Vervatinus</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body style="margin:0; padding:0; background-color:#121212; color:#ffffff; font-family:sans-serif;">
    <div id="header-placeholder"></div>
    <div style="max-width:1200px; margin:40px auto; padding:0 20px; min-height:65vh;">
        <h1>Contact Our Group</h1>
        <p>Reach out with infrastructural developer and network inquiries.</p>
    </div>
    <div id="footer-placeholder"></div>
    <script>
        var basePath = (window.location.protocol === 'file:') ? '' : '/vervatinus';
        fetch(basePath + '/header.html').then(r => r.text()).then(d => document.getElementById('header-placeholder').innerHTML = d);
        fetch(basePath + '/footer.html').then(r => r.text()).then(d => document.getElementById('footer-placeholder').innerHTML = d);
    </script>
</body>
</html>
