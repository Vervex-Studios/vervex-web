<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;

    }
    body {
      background: #f9f6f2;
      color: #1a1510;

    h1 {

      font-size: clamp(3rem, 7vw, 4.5rem);
